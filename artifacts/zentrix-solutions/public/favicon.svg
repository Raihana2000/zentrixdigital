<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    ZentrixDigital Favicon — ZD Blockmark (flat, simplified)
    Same geometry as the favicon PNGs.
    Not used as browser-tab favicon (PNGs are used instead for reliability).
    Used only for social sharing / open-graph contexts.
  -->
  <rect width="512" height="512" fill="#0B0B0B"/>

  <!-- Z in electric blue: top bar + diagonal polygon + bottom bar -->
  <rect x="14"  y="14"  width="234" height="76" fill="#3B82F6"/>
  <polygon points="248,90 148,90 14,422 114,422"  fill="#3B82F6"/>
  <rect x="14"  y="422" width="234" height="76" fill="#3B82F6"/>

  <!-- D in white: full rect minus inner hollow -->
  <rect x="264" y="14"  width="234" height="484" fill="#FFFFFF"/>
  <rect x="314" y="90"  width="134" height="332" fill="#0B0B0B"/>
</svg>
