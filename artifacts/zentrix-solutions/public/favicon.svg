<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    ZentrixDigital Favicon — Compact Fusion ZD Monogram
    Winner: Variant C refined
    - D drawn first (behind), Z drawn second (on top) → clean hard edges
    - No gradient — flat #3B82F6 blue for maximum sharpness at 16px
    - 80px-wide Z diagonal (= ~2.5px at 16×16), 100px wide D stroke
    - rx=72 rounded-square background, 44px icon padding
    Works crisp: dark browser tabs, light browser tabs, iOS, Android
  -->

  <!-- Black rounded-square background -->
  <rect width="512" height="512" rx="72" fill="#0B0B0B"/>

  <!--
    D letterform (drawn first — Z will cover any overlap area)
    Left stroke: x=232–332 (100px wide), full height y=54–458
    Bowl arc: (332,54) → (332,458), rx=132, ry=202 → rightmost x=464
    ry = (458−54)/2 = 202 (perfect semicircle vertically)
  -->
  <path
    d="M 232,54 L 332,54 A 132,202 0 0 1 332,458 L 232,458 Z"
    fill="white"
  />

  <!--
    Z letterform (drawn on top — covers D overlap cleanly)
    Top bar:    x=44–380, y=54–124   (width=336, height=70)
    Bottom bar: x=44–468, y=388–458  (width=424, height=70)
    Diagonal outer: (380,124) → (132,388) | slope = −0.893
    Diagonal inner: (300,124) → (44,388)  | slope = −0.898 ≈ parallel ✓
    Horizontal stroke width = 380−300 = 80px (reads as ≈2.5px at 16×16)
  -->
  <polygon
    points="44,54 380,54 380,124 132,388 468,388 468,458 44,458 44,388 300,124 44,124"
    fill="#3B82F6"
  />
</svg>
