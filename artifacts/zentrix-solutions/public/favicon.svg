<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!--
    ZentrixDigital Favicon — ZD Pixel Blockmark
    16×16 viewBox, rectangles only = zero sub-pixel blur at any browser DPI
    Z: electric blue #3B82F6, staircase diagonal (5 blocks, gap-free)
    D: white #FFFFFF, rectangular D with 1px inner hollow
    1px padding all sides, 1px gap between Z and D
  -->
  <rect width="16" height="16" fill="#0B0B0B"/>

  <!-- Z in electric blue -->
  <rect x="1" y="1"  width="8" height="2" fill="#3B82F6"/>
  <rect x="6" y="3"  width="3" height="3" fill="#3B82F6"/>
  <rect x="3" y="6"  width="5" height="3" fill="#3B82F6"/>
  <rect x="1" y="9"  width="3" height="2" fill="#3B82F6"/>
  <rect x="1" y="11" width="8" height="2" fill="#3B82F6"/>

  <!-- D in white — left stroke + top bar + bottom bar + right bowl -->
  <rect x="10" y="1"  width="5" height="2"  fill="#FFFFFF"/>
  <rect x="10" y="1"  width="2" height="12" fill="#FFFFFF"/>
  <rect x="13" y="3"  width="2" height="8"  fill="#FFFFFF"/>
  <rect x="10" y="11" width="5" height="2"  fill="#FFFFFF"/>
</svg>
