<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zBlue" x1="45" y1="55" x2="415" y2="457" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Black rounded square background -->
  <rect width="512" height="512" rx="80" fill="#0B0B0B"/>

  <!-- Z letterform — electric blue gradient
       Outer-right diagonal: (415,145)→(125,367) | Inner-left diagonal: (335,145)→(45,367)
       Both edges slope = -0.766 (parallel, equal 80px horizontal stroke width) -->
  <polygon
    points="45,55 415,55 415,145 125,367 415,367 415,457 45,457 45,367 335,145 45,145"
    fill="url(#zBlue)"
  />

  <!-- D letterform — white, overlapping Z on the right
       Left stroke: x=265–355 (90px wide, full height)
       Bowl arc: (355,55) → (355,457), rx=125, ry=201, rightmost at x=480 -->
  <path
    d="M 265,55 L 355,55 A 125,201 0 0 1 355,457 L 265,457 Z"
    fill="white"
  />
</svg>
